services:
  postgres:
    container_name: recurvos-prod-postgres
    ports:
      - "5432:5432"
    volumes:
      - /srv/recurvos-storage/prod/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  mailpit:
    container_name: recurvos-prod-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  api:
    container_name: recurvos-prod-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      AppUrls__ApiBaseUrl: ${APP_API_BASE_URL}
      AppUrls__WebBaseUrl: ${APP_WEB_BASE_URL}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT}
      Smtp__Username: ${SMTP_USERNAME}
      Smtp__Password: ${SMTP_PASSWORD}
      Smtp__FromEmail: ${SMTP_FROM_EMAIL}
      Smtp__FromName: ${SMTP_FROM_NAME}
      Billplz__ApiKey: ${BILLPLZ_API_KEY}
      Billplz__CollectionId: ${BILLPLZ_COLLECTION_ID}
      Billplz__XSignatureKey: ${BILLPLZ_X_SIGNATURE_KEY}
      Cors__AllowedOrigins__0: https://app.recurvos.com
      Cors__AllowedOrigins__1: https://recurvos.com
      WhatsAppWebJs__BaseUrl: http://worker:3011/api
    ports:
      - "7001:8080"
    restart: unless-stopped

  web:
    container_name: recurvos-prod-web
    build:
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL}
        VITE_APP_SITE_URL: ${VITE_APP_SITE_URL}
    ports:
      - "4173:80"
    restart: unless-stopped

  worker:
    container_name: recurvos-prod-worker
    environment:
      NODE_ENV: production
      WHATSAPP_SESSION_DIR: /app/storage/whatsapp-webjs
      WHATSAPP_WORKER_TOKEN: ${WHATSAPP_WORKER_TOKEN}
      PORT: 3011
    volumes:
      - /srv/recurvos-storage/prod/whatsapp:/app/storage/whatsapp-webjs
    restart: unless-stopped
