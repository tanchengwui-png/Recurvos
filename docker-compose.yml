version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recurvos}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: src/Recurvos.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-recurvos};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Jwt__SecretKey: ${JWT_SECRET_KEY:-super-secret-development-key-change-me}
      AppUrls__ApiBaseUrl: ${APP_API_BASE_URL:-http://localhost:7001}
      AppUrls__WebBaseUrl: ${APP_WEB_BASE_URL:-http://localhost:5173}
      Smtp__Host: ${SMTP_HOST:-mailpit}
      Smtp__Port: ${SMTP_PORT:-1025}
      Smtp__Username: ${SMTP_USERNAME:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__FromEmail: ${SMTP_FROM_EMAIL:-noreply@recurvos.local}
      Smtp__FromName: ${SMTP_FROM_NAME:-Recurvos}
      Billplz__ApiKey: ${BILLPLZ_API_KEY:-}
      Billplz__CollectionId: ${BILLPLZ_COLLECTION_ID:-}
      Billplz__XSignatureKey: ${BILLPLZ_X_SIGNATURE_KEY:-}
    ports:
      - "7001:8080"
    depends_on:
      - postgres
      - mailpit

  web:
    build:
      context: .
      dockerfile: src/Recurvos.Web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:7001/api
        VITE_PUBLIC_SITE_URL: http://localhost:4173
        VITE_APP_SITE_URL: http://localhost:4173
    ports:
      - "4173:80"
    depends_on:
      - api

volumes:
  postgres-data:
